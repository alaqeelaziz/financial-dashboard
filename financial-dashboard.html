<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light" data-lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>لوحة المال — Market Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ─── LIGHT ─── */
:root,[data-theme="light"]{
  --bg:#f5f0e8;--bg2:#ede8de;--surface:#fff;--card:#fff;--card2:#faf7f1;
  --border:#e4ddd0;--border2:#c9b99a;
  --text:#181410;--text2:#3a3228;--muted:#7a6e62;--dim:#b0a898;
  --gold:#b8960c;--gold2:#8b6e06;--gold3:#d4a90e;--gold-bg:#fef8e0;
  --green:#187a3c;--green-bg:#e8f7ee;--green-bd:#a8d8b8;
  --red:#c0331e;--red-bg:#fdf0ee;--red-bd:#e8b8b0;
  --hdr:#16120e;--hdr-bd:#c9a812;
  --ticker:#201a12;--ticker-t:#5a5040;
  --tab-bg:#fff;--tab-bd:#e4ddd0;--inp-bg:#f7f3ec;
  --tbl-hd:#f7f3eb;--tbl-hover:#fdf8ef;
  --sh:0 2px 16px rgba(100,80,20,.07),0 1px 3px rgba(100,80,20,.04);
  --sh-md:0 6px 32px rgba(100,80,20,.11),0 2px 8px rgba(100,80,20,.06);
  --scrl:#d0c8b8;
}
/* ─── DARK ─── */
[data-theme="dark"]{
  --bg:#0c0a07;--bg2:#141008;--surface:#1a1510;--card:#1e1a12;--card2:#231f16;
  --border:#2a2318;--border2:#3a3020;
  --text:#f0e8d5;--text2:#c8b890;--muted:#786858;--dim:#453828;
  --gold:#c9a812;--gold2:#a88c0e;--gold3:#e8c030;--gold-bg:#1a1606;
  --green:#28b858;--green-bg:#08180e;--green-bd:#184828;
  --red:#e04828;--red-bg:#1a0a06;--red-bd:#501810;
  --hdr:#080604;--hdr-bd:#c9a812;
  --ticker:#080604;--ticker-t:#403828;
  --tab-bg:#1a1510;--tab-bd:#2a2318;--inp-bg:#141008;
  --tbl-hd:#16120e;--tbl-hover:#231f16;
  --sh:0 2px 16px rgba(0,0,0,.35),0 1px 4px rgba(0,0,0,.25);
  --sh-md:0 6px 32px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.3);
  --scrl:#3a3020;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 35% at 50% 0,rgba(200,160,20,.05),transparent 65%)}
*{scrollbar-width:thin;scrollbar-color:var(--scrl) transparent}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--scrl);border-radius:2px}

/* ── HEADER ── */
.hdr{background:var(--hdr);border-bottom:1.5px solid var(--hdr-bd);position:sticky;top:0;z-index:300;box-shadow:0 4px 32px rgba(0,0,0,.4)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;max-width:1440px;margin:0 auto;padding:0 18px;height:58px;gap:8px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#d4a90e,#8b6e06);display:flex;align-items:center;justify-content:center;font-size:1.15rem;box-shadow:0 3px 14px rgba(200,160,12,.45);flex-shrink:0}
.logo-name{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:#e8d898}
.logo-name em{color:#d4a90e;font-style:normal}
.hdr-r{display:flex;align-items:center;gap:8px}
#clock{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:#907860;display:none}
@media(min-width:520px){#clock{display:block}}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(40,184,88,.1);border:1px solid rgba(40,184,88,.22);border-radius:20px;padding:3px 9px;font-size:.64rem;font-weight:700;color:#40cc78;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.live-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#40cc78;animation:pls 2s infinite;flex-shrink:0}
@keyframes pls{0%,100%{opacity:1;box-shadow:0 0 5px #40cc78}50%{opacity:.3;box-shadow:none}}

/* LANGUAGE SELECTOR */
.lang-sel{position:relative;flex-shrink:0}
.lang-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:6px 10px;cursor:pointer;font-size:.75rem;color:#c8a870;font-family:inherit;transition:all .2s;white-space:nowrap}
.lang-btn:hover{background:rgba(200,160,12,.18);border-color:#c9a812}
.lang-flag{font-size:.9rem}
.lang-dd{position:absolute;top:calc(100% + 6px);left:0;background:var(--hdr);border:1px solid rgba(200,160,12,.3);border-radius:10px;overflow:hidden;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,.4);min-width:140px;display:none}
[dir="rtl"] .lang-dd{left:auto;right:0}
.lang-dd.open{display:block}
.lang-opt{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;font-size:.8rem;color:#c8b890;transition:background .15s;border:none;background:none;width:100%;text-align:right;font-family:inherit}
.lang-opt:hover{background:rgba(200,160,12,.12);color:#e8c830}
.lang-opt.active{color:#d4a90e;font-weight:700}

.theme-btn{width:36px;height:36px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;transition:all .2s;color:#c8a870;flex-shrink:0}
.theme-btn:hover{background:rgba(200,160,12,.18);border-color:#c9a812}

/* ── TICKER ── */
.ticker-wrap{background:var(--ticker);border-bottom:1px solid rgba(200,160,12,.12);height:28px;overflow:hidden;display:flex;align-items:center}
.ticker-inner{display:flex;gap:0;white-space:nowrap;animation:tickRun 50s linear infinite}
.ticker-inner:hover{animation-play-state:paused}
@keyframes tickRun{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.t-item{display:inline-flex;align-items:center;gap:6px;padding:0 18px;font-family:'JetBrains Mono',monospace;font-size:.69rem}
.t-sym{color:var(--ticker-t)}

/* ── TABS ── */
.tabs-bar{background:var(--tab-bg);border-bottom:1px solid var(--tab-bd);position:sticky;top:58px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.04);overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tabs-list{display:flex;max-width:1440px;margin:0 auto;padding:7px 14px;gap:4px;min-width:max-content;align-items:center}
.tab-btn{display:flex;align-items:center;gap:6px;padding:7px 15px;border:1.5px solid transparent;border-radius:9px;background:transparent;color:var(--muted);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.81rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.tab-btn:hover{color:var(--text);background:var(--card2);border-color:var(--border)}
.tab-btn.active{color:var(--gold);font-weight:700;background:var(--gold-bg);border-color:rgba(184,150,12,.35)}
.tab-btn .ti{font-size:.9rem}
.tlbl{display:inline}
@media(max-width:500px){.tab-btn{padding:7px 10px}.tlbl{display:none}}

/* ── PAGE ── */
.page{position:relative;z-index:1}
.wrap{max-width:1440px;margin:0 auto;padding:22px 16px 72px}
@media(max-width:600px){.wrap{padding:14px 10px 60px}}
.pane{display:none;animation:fadeUp .26s ease}
.pane.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* ── SEC HEADER ── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px;flex-wrap:wrap}
.sec-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:9px}
.btn-refresh{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:7px 14px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:var(--sh)}
.btn-refresh:hover{border-color:var(--gold);color:var(--gold)}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.news-grid{display:grid;grid-template-columns:1fr 290px;gap:18px}
@media(max-width:1200px){.g5{grid-template-columns:repeat(4,1fr)}}
@media(max-width:1100px){.news-grid{grid-template-columns:1fr}.g4{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.g5{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
@media(max-width:480px){.g5{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--sh);transition:box-shadow .2s,border-color .2s,background .2s}
.card:hover{box-shadow:var(--sh-md);border-color:var(--border2)}
.card-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.card-lbl::before{content:'';width:3px;height:13px;border-radius:2px;background:linear-gradient(180deg,var(--gold3),var(--gold));flex-shrink:0}

/* ── PRICE CARD ── */
.pc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:17px 18px;box-shadow:var(--sh);transition:all .22s;position:relative;overflow:hidden}
.pc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .22s}
.pc:hover{box-shadow:var(--sh-md);border-color:var(--border2);transform:translateY(-2px)}
.pc:hover::after{opacity:1}
.pc-sym{font-size:.68rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.pc-name{font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:7px}
.pc-price{font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1}
.pc-chg{font-size:.73rem;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:4px}
.pc-meta{font-size:.66rem;color:var(--dim);margin-top:4px}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:.67rem;font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.up{color:var(--green)}.down{color:var(--red)}.neu{color:var(--muted)}
.tag-up{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.tag-dn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.tag-n{background:var(--card2);color:var(--muted);border:1px solid var(--border)}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:.63rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;padding:9px 13px;text-align:right;border-bottom:2px solid var(--border);background:var(--tbl-hd);white-space:nowrap}
.tbl td{padding:11px 13px;font-size:.83rem;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--tbl-hover)}
.tbl .mn{font-family:'JetBrains Mono',monospace;font-weight:600}
.tbl-wrap{overflow-x:auto;border-radius:10px}
.scroll-box{max-height:480px;overflow-y:auto}

/* ── LOADER ── */
.ldr{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-size:.83rem}
.spin{width:17px;height:17px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spinA .7s linear infinite;flex-shrink:0}
@keyframes spinA{to{transform:rotate(360deg)}}

/* ── NOTES ── */
.api-note{background:var(--gold-bg);border:1px solid rgba(184,150,12,.22);border-radius:9px;padding:9px 14px;margin-bottom:16px;font-size:.73rem;color:var(--gold2);display:flex;gap:7px;align-items:flex-start;line-height:1.55}
.ok-note{background:var(--green-bg);border:1px solid var(--green-bd);border-radius:9px;padding:7px 14px;margin-bottom:14px;font-size:.72rem;color:var(--green);font-weight:600;display:flex;align-items:center;gap:6px}

/* ── NEWS ── */
.ni{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px 17px;margin-bottom:9px;transition:all .2s;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--sh)}
.ni::after{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:linear-gradient(180deg,var(--gold3),var(--gold));opacity:0;transition:opacity .2s}
[dir="ltr"] .ni::after{right:auto;left:0}
.ni:hover{border-color:var(--border2);box-shadow:var(--sh-md);transform:translateX(-3px)}
[dir="ltr"] .ni:hover{transform:translateX(3px)}
.ni:hover::after{opacity:1}
.ni-src{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);margin-bottom:4px;display:flex;align-items:center;gap:7px}
.ni-time{color:var(--dim);font-weight:400}
.ni-ttl{font-size:.86rem;font-weight:600;line-height:1.55;color:var(--text);margin-bottom:3px}
.ni-dsc{font-size:.74rem;color:var(--muted);line-height:1.6}
.mini-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.79rem}
.mini-row:last-child{border-bottom:none}
.mini-nm{color:var(--text2);font-weight:500}

/* ── DIVIDERS ── */
.div{height:1px;background:var(--border);margin:18px 0}
.orn{display:flex;align-items:center;gap:10px;margin:6px 0 20px;color:rgba(184,150,12,.3);font-size:.72rem}
.orn::before,.orn::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(184,150,12,.2),transparent)}

/* ── INPUTS ── */
.fld{margin-bottom:13px}
.fld label{display:block;font-size:.72rem;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.02em}
.fld input,.fld select,.irow input,.irow select{background:var(--inp-bg);border:1.5px solid var(--border);color:var(--text);border-radius:9px;padding:11px 14px;font-family:inherit;font-size:.88rem;transition:all .2s;width:100%;outline:none;-webkit-appearance:none;appearance:none}
.fld input:focus,.irow input:focus,.fld select:focus,.irow select:focus{border-color:var(--gold);background:var(--card);box-shadow:0 0 0 3px rgba(184,150,12,.1)}
.irow{display:flex;gap:9px}
.irow input{flex:1}
.irow select{flex:0 0 106px}

/* ── BUTTONS ── */
.btn-gold{width:100%;padding:12px;background:linear-gradient(135deg,#d4a90e 0%,#8b6e06 100%);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;letter-spacing:.03em;box-shadow:0 4px 18px rgba(184,150,12,.28)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(184,150,12,.4)}
.swap-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:50%;width:35px;height:35px;display:flex;align-items:center;justify-content:center;margin:-3px auto 5px;cursor:pointer;font-size:.9rem;color:var(--gold);transition:all .2s}
.swap-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold);transform:rotate(180deg)}

/* ── RESULT BOXES ── */
.rbox{padding:16px;border-radius:11px;text-align:center;margin-top:13px}
.r-gold{background:var(--gold-bg);border:1px solid rgba(184,150,12,.25)}
.r-green{background:var(--green-bg);border:1px solid var(--green-bd)}
.r-pur{background:#f5eeff;border:1px solid #d0a8f0}
[data-theme="dark"] .r-pur{background:#160c28;border-color:#501e90}
.rnum{font-family:'JetBrains Mono',monospace;font-size:1.85rem;font-weight:700;color:var(--gold)}
.r-green .rnum{color:var(--green)}
.r-pur .rnum{color:#8040c0}
[data-theme="dark"] .r-pur .rnum{color:#b070e8}
.rlbl{font-size:.73rem;color:var(--muted);margin-top:4px;line-height:1.5}

/* ── CONV / CALC BOX ── */
.conv-box,.calc-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:var(--sh-md)}
.conv-box{max-width:530px;margin:0 auto 22px}
.calc-box{max-width:520px;margin:0 auto 18px}
.conv-title,.calc-title{font-family:'Playfair Display',serif;font-size:.96rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:9px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.calc-title{font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.86rem}

/* ── FUEL ── */
.fuel-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:13px}
.fuel-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center}
.fuel-lbl{font-size:.67rem;color:var(--muted);margin-bottom:3px}
.fuel-val{font-family:'JetBrains Mono',monospace;font-size:.98rem;font-weight:700;color:var(--gold)}

/* ── SIDEBAR ── */
.sidebar-sticky{position:sticky;top:120px}
@media(max-width:1100px){.sidebar-sticky{position:static}}
.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <div class="logo">
      <div class="logo-mark">📊</div>
      <div class="logo-name" id="logoName">لوحة <em>المال</em></div>
    </div>
    <div class="hdr-r">
      <div class="live-badge" id="liveBadge">حي</div>
      <span id="clock"></span>

      <!-- Language Selector -->
      <div class="lang-sel">
        <button class="lang-btn" id="langBtn" onclick="toggleLangDD()">
          <span class="lang-flag" id="langFlag">🇸🇦</span>
          <span id="langLabel">العربية</span>
          <span>▾</span>
        </button>
        <div class="lang-dd" id="langDD">
          <button class="lang-opt active" onclick="setLang('ar')" data-lang="ar">🇸🇦 العربية</button>
          <button class="lang-opt" onclick="setLang('en')" data-lang="en">🇬🇧 English</button>
          <button class="lang-opt" onclick="setLang('fr')" data-lang="fr">🇫🇷 Français</button>
          <button class="lang-opt" onclick="setLang('es')" data-lang="es">🇪🇸 Español</button>
        </div>
      </div>

      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
  </div>
</header>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-inner" id="tickerInner">
    <span class="t-item"><span class="t-sym">BTC</span><span class="up">…</span></span>
  </div>
</div>

<!-- TABS -->
<nav class="tabs-bar"><div class="tabs-list" id="tabsList"></div></nav>

<!-- CONTENT -->
<div class="page"><div class="wrap">
  <div id="pane-news"     class="pane active"></div>
  <div id="pane-metals"   class="pane"></div>
  <div id="pane-stocks"   class="pane"></div>
  <div id="pane-crypto"   class="pane"></div>
  <div id="pane-oil"      class="pane"></div>
  <div id="pane-forex"    class="pane"></div>
  <div id="pane-discount" class="pane"></div>
</div></div>

<script>
'use strict';

/* ═══════════════════════════════════
   TRANSLATIONS
═══════════════════════════════════ */
const T = {
  ar: {
    dir:'rtl', logo:'لوحة <em>المال</em>', live:'حي', refresh:'↻ تحديث',
    loading:'جاري التحميل…', liveData:'بيانات حية', approxData:'بيانات تقريبية',
    needsKey:'يلزم مفتاح API للبيانات الحية',
    tabs:['الأخبار','المعادن','الأسهم','الرقمية','النفط','الصرف','الخصم'],
    // News
    newsTitle:'الأخبار الاقتصادية', cryptoSidebar:'العملات الرقمية', fxSidebar:'أسعار الصرف',
    // Metals

/* ═══════ LANG STATE ═══════ */
let curLang = localStorage.getItem('maal-lang') || 'ar';
let t = T[curLang];

function setLang(lang) {
  curLang = lang; t = T[lang];
  localStorage.setItem('maal-lang', lang);
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', t.dir);
  document.documentElement.setAttribute('data-lang', lang);
  // Update lang button
  document.getElementById('langFlag').textContent = LANG_META[lang].flag;
  document.getElementById('langLabel').textContent = LANG_META[lang].label;
  document.querySelectorAll('.lang-opt').forEach(o => o.classList.toggle('active', o.dataset.lang===lang));
  closeLangDD();
  // Update static UI
  document.getElementById('logoName').innerHTML = t.logo;
  document.getElementById('liveBadge').textContent = t.live;
  // Rebuild tabs
  buildTabs();
  // Reload active pane
  const activeTab = document.querySelector('.tab-btn.active')?.dataset.id || 'news';
  loaded.clear(); loaded.add('discount');
  LOADERS[activeTab]?.();
  loadDiscount();
  // Clock locale
  updateClock();
}

function toggleLangDD() {
  document.getElementById('langDD').classList.toggle('open');
}
function closeLangDD() {
  document.getElementById('langDD').classList.remove('open');
}
document.addEventListener('click', e => { if (!e.target.closest('.lang-sel')) closeLangDD(); });

/* ═══════ THEME ═══════ */
const initTheme = localStorage.getItem('maal-th') || 'light';
document.documentElement.setAttribute('data-theme', initTheme);
document.getElementById('themeBtn').textContent = initTheme==='dark' ? '☀️' : '🌙';
document.getElementById('themeBtn').addEventListener('click', () => {
  const th = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', th);
  document.getElementById('themeBtn').textContent = th==='dark' ? '☀️' : '🌙';
  localStorage.setItem('maal-th', th);
});

/* ═══════ CLOCK ═══════ */
const clkEl = document.getElementById('clock');
function updateClock() {
  const locale = curLang==='ar' ? 'ar-SA' : 'en-US';
  clkEl.textContent = new Date().toLocaleTimeString(locale, {hour12:false, timeZone:'Asia/Riyadh'});
}
setInterval(updateClock, 1000); updateClock();

/* ═══════ TABS ═══════ */
const TABS_IDS = ['news','metals','stocks','crypto','oil','forex','discount'];
const TABS_ICO = ['📰','🥇','📈','₿','🛢️','💱','🏷️'];
const loaded = new Set(['news','discount']);

function buildTabs() {
  const tl = document.getElementById('tabsList');
  const activeId = document.querySelector('.tab-btn.active')?.dataset.id || 'news';
  tl.innerHTML = '';
  TABS_IDS.forEach((id, i) => {
    const b = document.createElement('button');
    b.className = 'tab-btn' + (id===activeId ? ' active' : '');
    b.dataset.id = id;
    b.innerHTML = `<span class="ti">${TABS_ICO[i]}</span><span class="tlbl">${t.tabs[i]}</span>`;
    b.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      document.getElementById('pane-'+id).classList.add('active');
      if (!loaded.has(id)) { loaded.add(id); LOADERS[id]?.(); }
    });
    tl.appendChild(b);
  });
}

/* ═══════ HELPERS ═══════ */
const fmt = (n,d=2) => n==null||isNaN(n) ? '—' : (+n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtK = n => { if(!n) return '—'; if(n>=1e12) return '$'+(n/1e12).toFixed(2)+'T'; if(n>=1e9) return '$'+(n/1e9).toFixed(1)+'B'; if(n>=1e6) return '$'+(n/1e6).toFixed(0)+'M'; return '$'+fmt(n,0); };
const cc = v => (+v)>0 ? 'up' : (+v)<0 ? 'down' : 'neu';
const ctag = v => { if(v==null||isNaN(v)) return '<span class="tag tag-n">—</span>'; const n=+v,c=n>0?'tag-up':n<0?'tag-dn':'tag-n',a=n>0?'▲':n<0?'▼':''; return `<span class="tag ${c}">${a} ${Math.abs(n).toFixed(2)}%</span>`; };
const note = m => `<div class="api-note">⚠️ <span>${m}</span></div>`;
const okNote = m => `<div class="ok-note">✓ ${m}</div>`;
const ldr = () => `<div class="ldr"><div class="spin"></div>${t.loading}</div>`;
const ago = d => { const s=(Date.now()-new Date(d))/1000; if(s<60)return curLang==='ar'?'الآن':'now'; if(s<3600)return curLang==='ar'?`منذ ${~~(s/60)} د`:`${~~(s/60)}m ago`; if(s<86400)return curLang==='ar'?`منذ ${~~(s/3600)} س`:`${~~(s/3600)}h ago`; return curLang==='ar'?`منذ ${~~(s/86400)} ي`:`${~~(s/86400)}d ago`; };

/* ═══════ TICKER ═══════ */
function setTicker(items) {
  const doubled = [...items,...items];
  document.getElementById('tickerInner').innerHTML = doubled.map(x =>
    `<span class="t-item"><span class="t-sym">${x.sym}</span><span class="${cc(x.c)}">${x.p>=100?'$'+fmt(x.p,0):'$'+fmt(x.p,3)} ${(+x.c)>0?'▲':'▼'}${Math.abs(+x.c||0).toFixed(2)}%</span></span><span class="t-item" style="color:rgba(200,160,12,.2)">◆</span>`
  ).join('');
}

async function loadNews() {
  const p = document.getElementById('pane-news'); p.innerHTML = ldr();
  const FEEDS = [
    {n:'Reuters',u:'https://feeds.reuters.com/reuters/businessNews',f:'🌐'},
    {n:'BBC',u:'https://feeds.bbci.co.uk/arabic/business/rss.xml',f:'🇬🇧'},
    {n:'Al Arabiya',u:'https://www.alarabiya.net/tools/rss/economy.xml',f:'🇦🇪'},
  ];
  let items = [];
  for (const fd of FEEDS) {
    try {
      const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(fd.u)}`);
      if (!r.ok) continue;
      const xml = new DOMParser().parseFromString((await r.json()).contents,'text/xml');
      xml.querySelectorAll('item').forEach((it,i) => {
        if(i>=6) return;
        items.push({title:it.querySelector('title')?.textContent||'',
          desc:(it.querySelector('description')?.textContent||'').replace(/<[^>]+>/g,'').slice(0,140),
          pub:new Date(it.querySelector('pubDate')?.textContent||Date.now()),
          link:it.querySelector('link')?.textContent||'#', src:fd.n, flag:fd.f});
      });
    } catch(e) {}
  }
  items.sort((a,b) => b.pub - a.pub);
  p.innerHTML = `
  <div class="sec-hd">
    <div class="sec-title">📰 ${t.newsTitle}</div>
    <button class="btn-refresh" onclick="loadNews()">${t.refresh}</button>
  </div>
  <div class="news-grid">
    <div id="newsMain">${items.length ? items.slice(0,16).map(it=>`<a href="${it.link}" target="_blank" style="text-decoration:none;color:inherit">
      <div class="ni"><div class="ni-src">${it.flag} ${it.src} <span class="ni-time">${ago(it.pub)}</span></div>
      <div class="ni-ttl">${it.title}</div>${it.desc?`<div class="ni-dsc">${it.desc}…</div>`:''}</div></a>`).join('')
      : note(t.approxData) + mockNews() }</div>
    <div>
      <div class="sidebar-sticky">
        <div class="card mb16"><div class="card-lbl">${t.cryptoSidebar}</div><div id="sbCrypto">${ldr()}</div></div>
        <div class="card"><div class="card-lbl">${t.fxSidebar}</div><div id="sbForex">${ldr()}</div></div>
      </div>
    </div>
  </div>`;
  fetchCG().then(d => {
    if(!d) return;
    const el = document.getElementById('sbCrypto');
    if(el) el.innerHTML = [{id:'bitcoin',s:'BTC'},{id:'ethereum',s:'ETH'},{id:'solana',s:'SOL'},{id:'binancecoin',s:'BNB'}]
      .map(c=>`<div class="mini-row"><span class="mini-nm">${t.COINS[['bitcoin','ethereum','binancecoin','ripple','cardano','solana','dogecoin','litecoin','chainlink','polkadot','avalanche-2','matic-network'].indexOf(c.id)]||c.s} <span style="color:var(--dim);font-size:.68rem">${c.s}</span></span>
        <span class="${cc(d[c.id]?.usd_24h_change)}" style="font-family:'JetBrains Mono',monospace;font-size:.79rem;font-weight:700">$${d[c.id]?.usd>=100?fmt(d[c.id].usd,0):fmt(d[c.id]?.usd||0,2)}</span></div>`).join('');
  });
  fetchFX().then(f => {
    const rates = f?.rates || {SAR:3.75,EUR:.916,GBP:.787,AED:3.673,KWD:.307};
    const el = document.getElementById('sbForex');
    const pairs = [{c:'SAR',i:0},{c:'EUR',i:6},{c:'GBP',i:7},{c:'AED',i:1},{c:'KWD',i:2}];
    if(el) el.innerHTML = pairs.map(x=>`<div class="mini-row"><span class="mini-nm">${t.CURR_NAMES[x.i]} (${x.c})</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:.79rem;font-weight:600">${fmt(rates[x.c]||0,4)}</span></div>`).join('');
  });
}

  const rates=d?.rates||FB; const isLive=!!d;
  const CODES=['SAR','AED','KWD','QAR','BHD','OMR','EUR','GBP','JPY','CHF','CNY','CAD','AUD','EGP','TRY','INR'];
  const FLAGS2=['🇸🇦','🇦🇪','🇰🇼','🇶🇦','🇧🇭','🇴🇲','🇪🇺','🇬🇧','🇯🇵','🇨🇭','🇨🇳','🇨🇦','🇦🇺','🇪🇬','🇹🇷','🇮🇳'];

  <div class="conv-box">
    <div class="conv-title">${t.converterTitle}</div>
    <div class="fld"><label>${t.amountFrom}</label>
      <div class="irow"><input type="number" id="fxA" value="100" oninput="doConv()">
      <select id="fxF" onchange="doConv()">${ALL.map(x=>`<option value="${x.c}" ${x.c==='USD'?'selected':''}>${x.f} ${x.c}</option>`).join('')}</select></div></div>
    <button class="swap-btn" onclick="swpFX()">⇅</button>
    <div class="fld"><label>${t.targetCurr}</label>
      <div class="irow"><input type="number" id="fxR" readonly style="cursor:default;opacity:.85">
      <select id="fxT" onchange="doConv()">${ALL.map(x=>`<option value="${x.c}" ${x.c==='SAR'?'selected':''}>${x.f} ${x.c}</option>`).join('')}</select></div></div>

  <tbody>${CODES.map((c,i)=>{const r=rates[c]||FB[c];return`<tr>
    <td><strong>${FLAGS2[i]} ${c}</strong></td><td style="color:var(--muted)">${t.CURR_NAMES[i]}</td>
    <td class="mn">${fmt(r,4)}</td><td class="mn" style="color:var(--muted)">${fmt(1/r,6)}</td></tr>`;}).join('')}</tbody></table></div></div>`;
  doConv();
}
function doConv(){
  const amt=parseFloat(document.getElementById('fxA')?.value)||0;
  const from=document.getElementById('fxF')?.value,to=document.getElementById('fxT')?.value;
  if(!from||!to)return;
  const FB2={USD:1,SAR:3.75,EUR:.916,GBP:.787,JPY:151.4,AED:3.673,KWD:.307,EGP:48.6,TRY:32.1,CNY:7.24,CHF:.892,CAD:1.363,AUD:1.527,QAR:3.641,BHD:.376,OMR:.385,INR:83.4};
  const r=fxCache?.rates?{USD:1,...fxCache.rates}:FB2;
  const res=(amt/(r[from]||1))*(r[to]||1),rate=(r[to]||1)/(r[from]||1);
  const el=document.getElementById('fxR'); if(el)el.value=fmt(res,4);
  const out=document.getElementById('fxOut');
  if(out&&amt>0){out.style.display='block';out.innerHTML=`<div class="rnum">${fmt(res,2)} <span style="font-size:1rem">${to}</span></div>
    <div class="rlbl">${fmt(amt,0)} ${from} = ${fmt(res,4)} ${to}<br><span style="font-size:.7rem;color:var(--dim)">1 ${from} = ${fmt(rate,6)} ${to}</span></div>`;}
}
function swpFX(){const a=document.getElementById('fxF'),b=document.getElementById('fxT');if(!a||!b)return;[a.value,b.value]=[b.value,a.value];doConv();}

/* ═══════════════════════════════════
   7. DISCOUNT
═══════════════════════════════════ */
function loadDiscount(){
  const p=document.getElementById('pane-discount');
  p.innerHTML=`
  <div class="sec-hd"><div class="sec-title">🏷️ ${t.discTitle}</div></div>
  <div style="max-width:540px;margin:0 auto">
    <div class="calc-box">
      <div class="calc-title">${t.calcAfterTitle}</div>
      <div class="fld"><label>${t.origPrice}</label><input type="number" id="a1" placeholder="500" oninput="calcA()"></div>
      <div class="fld"><label>${t.discPct}</label><input type="number" id="a2" placeholder="20" min="0" max="100" oninput="calcA()"></div>
      <div id="aOut" class="rbox r-green" style="display:none"></div>
    </div>
    <div class="orn">${t.orReverse}</div>
    <div class="calc-box">
      <div class="calc-title">${t.calcBeforeTitle}</div>
      <div class="fld"><label>${t.discPrice}</label><input type="number" id="b1" placeholder="400" oninput="calcB()"></div>
      <div class="fld"><label>${t.appliedDisc}</label><input type="number" id="b2" placeholder="20" min="0" max="99" oninput="calcB()"></div>
      <div id="bOut" class="rbox r-gold" style="display:none"></div>
    </div>
    <div class="orn">${t.multiDisc}</div>
    <div class="calc-box">
      <div class="calc-title">${t.calcMultiTitle}</div>
      <div class="fld"><label>${t.origPrice2}</label><input type="number" id="c0" placeholder="1000" oninput="calcC()"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:13px">
        <div class="fld" style="margin:0"><label>${t.disc1}</label><input type="number" id="c1" placeholder="10" oninput="calcC()" style="text-align:center"></div>
        <div class="fld" style="margin:0"><label>${t.disc2}</label><input type="number" id="c2" placeholder="5" oninput="calcC()" style="text-align:center"></div>
        <div class="fld" style="margin:0"><label>${t.disc3}</label><input type="number" id="c3" placeholder="-" oninput="calcC()" style="text-align:center"></div>
      </div>
      <div id="cOut" class="rbox r-pur" style="display:none"></div>
    </div>
  </div>`;
}
function calcA(){
  const o=+document.getElementById('a1').value,pct=+document.getElementById('a2').value,box=document.getElementById('aOut');
  if(!o||isNaN(pct)){box.style.display='none';return;}
  const s=o*pct/100,f=o-s;box.style.display='block';
  box.innerHTML=`<div class="rnum">${fmt(f)} <span style="font-size:1rem">${t.currency_sym}</span></div>
    <div class="rlbl">${t.saved} <strong style="color:var(--green)">${fmt(s)} ${t.currency_sym}</strong> (${pct}%)</div>`;
}
function calcB(){
  const d=+document.getElementById('b1').value,pct=+document.getElementById('b2').value,box=document.getElementById('bOut');
  if(!d||!pct||pct>=100){box.style.display='none';return;}
  const o=d/(1-pct/100),s=o-d;box.style.display='block';
  box.innerHTML=`<div class="rnum">${fmt(o)} <span style="font-size:1rem">${t.currency_sym}</span></div>
    <div class="rlbl">${t.origPriceLabel} • ${t.savedOf} <strong style="color:var(--gold)">${fmt(s)} ${t.currency_sym}</strong></div>`;
}
function calcC(){
  const o=+document.getElementById('c0').value;
  const d1=+document.getElementById('c1').value||0,d2=+document.getElementById('c2').value||0,d3=+document.getElementById('c3').value||0;
  const box=document.getElementById('cOut');if(!o){box.style.display='none';return;}
  let pr=o;if(d1)pr*=(1-d1/100);if(d2)pr*=(1-d2/100);if(d3)pr*=(1-d3/100);
  const sv=o-pr,eff=((sv/o)*100).toFixed(2);box.style.display='block';
  box.innerHTML=`<div class="rnum">${fmt(pr)} <span style="font-size:1rem">${t.currency_sym}</span></div>
    <div class="rlbl">${t.saved} <strong>${fmt(sv)} ${t.currency_sym}</strong> • ${t.effectiveDisc} <strong>${eff}%</strong></div>`;
}
